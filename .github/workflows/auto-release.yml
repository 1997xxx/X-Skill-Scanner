name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          # Primary: pyproject.toml (canonical source)
          VERSION=$(grep -oP '^version\s*=\s*"\K[^"]+' pyproject.toml 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            # Fallback: SKILL.md frontmatter
            VERSION=$(grep -oP '^version:\s*\K[\d.]+' SKILL.md 2>/dev/null || echo "")
          fi
          if [ -z "$VERSION" ]; then
            # Last resort: git describe
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            VERSION="${VERSION#v}"
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: v${VERSION}"

      - name: Check if release exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Creating new release $TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
