# Credential Theft Detection Rules
# 凭证窃取检测规则 — v5.5 增强版（含排除模式）

- id: CRED_001
  category: credential_theft
  severity: HIGH
  description: "从环境变量读取敏感凭证"
  patterns:
    - "os\\.environ\\.get\\(['\"](?:TOKEN|SECRET|KEY|PASSWORD|API_KEY)"
    - "process\\.env\\.(?:TOKEN|SECRET|KEY|PASSWORD|API_KEY)"
    - "getenv\\(['\"](?:TOKEN|SECRET|KEY|PASSWORD)"
  exclude_patterns:
    - "^\\s*#"
    - "^\\s*//"
    - '"pattern"\\s*[:=]'
    - '"indicator"\\s*[:=]'
    - 'class\\s+\\w+.*Rule'
    - 'def\\s+test_'
    - "\\.get\\(['\"]token['\"],\\s*['\"]"
    - "json\\.loads.*\\.get"
    - "config\\[.*\\]\\.get"
  file_types:
    - python
    - javascript
    - typescript
    - bash

- id: CRED_002
  category: hardcoded_secrets
  severity: CRITICAL
  description: "硬编码凭证或密钥"
  patterns:
    - "(?:password|secret|api_key|token)\\s*=\\s*[\"'][^\"']{8,}[\"']"
    - "AKIA[0-9A-Z]{16}"
    - "ghp_[a-zA-Z0-9]{36}"
    - "sk-[a-zA-Z0-9]{48}"
  exclude_patterns:
    - "^\\s*#"
    - "^\\s*//"
    - "EXAMPLE|example|placeholder|your_"
    - '"pattern"\\s*[:=]'
    - 'def\\s+test_'
  file_types:
    - python
    - javascript
    - typescript

- id: CRED_003
  category: credential_theft
  severity: HIGH
  description: "读取系统凭证文件"
  patterns:
    - "\\.ssh/id_rsa"
    - "\\.ssh/id_ed25519"
    - "/etc/shadow"
    - "/etc/passwd"
    - "Library/Keychains"
    - "Credential Manager"
    - "\\.netrc"
    - "\\.pgpass"
  exclude_patterns:
    - "^\\s*#"
    - "^\\s*//"
    - '"pattern"\\s*[:=]'
    - '"indicator"\\s*[:=]'
    - 'class\\s+\\w+.*Rule'
    - 'def\\s+test_'
  file_types:
    - python
    - javascript
    - typescript
    - bash
