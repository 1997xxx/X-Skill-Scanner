# Ant International Skill Scanner - 配置文件
# 控制自动扫描、引擎选项和风险阈值

auto_scan:
  enabled: true
  block_on_severity: high
  timeout_seconds: 120

engine:
  static: true
  threat_intel: true
  semantic: true        # 默认启用语义审计（使用 OpenClaw 配置的大模型）
  dynamic: false

# 语义审计配置
semantic_config:
  enabled: true
  model: auto           # 使用 OpenClaw 配置的默认模型
  timeout_seconds: 60
  max_content_length: 8000

# 忽略的技能
ignore_skills: []
